<!DOCTYPE html>
<html lang="tr" dir="ltr" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PhotoScanner Web</title>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <style>
    :root {
      --bg:#f5f2eb; --panel:rgba(255,255,255,.78); --panel-2:rgba(255,255,255,.92); --text:#1f2624; --muted:#66706a;
      --line:rgba(31,38,36,.12); --accent:#0d6d67; --accent-2:#093f43; --danger:#ae4d69; --ok:#3f7a2a;
      --shadow:0 18px 45px rgba(0,0,0,.12); --radius:24px; --radius2:16px;
    }
    [data-theme="dark"] {
      --bg:#141816; --panel:rgba(28,31,30,.78); --panel-2:rgba(35,38,37,.96); --text:#eef2ef; --muted:#9ba8a1;
      --line:rgba(238,242,239,.12); --accent:#63c0b7; --accent-2:#8ad9d1; --danger:#f08ab0; --ok:#97d06f;
      --shadow:0 24px 55px rgba(0,0,0,.36);
    }
    *{box-sizing:border-box} html,body{margin:0;min-height:100%} body{font-family:Inter,system-ui,Arial,sans-serif;background:radial-gradient(circle at top left, rgba(13,109,103,.09), transparent 35%), radial-gradient(circle at bottom right, rgba(151,112,44,.08), transparent 25%), var(--bg); color:var(--text)}
    button,input{font:inherit}
    .app{width:min(1500px,calc(100vw - 24px));margin:12px auto;display:grid;grid-template-columns:minmax(320px,1.5fr) minmax(320px,.95fr);gap:14px}
    .panel{background:var(--panel);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
    .left,.right{padding:16px}.right{position:sticky;top:12px}
    .topbar{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:14px}
    .brand{display:flex;align-items:center;gap:12px;min-width:0}.logo{width:44px;height:44px;border-radius:14px;display:grid;place-items:center;background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#fff;flex:0 0 auto}.brand h1{margin:0;font-size:1.5rem;line-height:1.05}.brand p{margin:4px 0 0;color:var(--muted);font-size:.95rem}
    .top-actions{display:flex;align-items:center;gap:8px}
    .lang-box{position:relative}.lang-trigger,.theme-btn{border:1px solid var(--line);background:var(--panel-2);color:var(--text);cursor:pointer;box-shadow:0 1px 2px rgba(0,0,0,.05)}
    .theme-btn{width:46px;height:46px;border-radius:999px}.lang-trigger{height:46px;padding:0 12px;border-radius:999px;display:flex;align-items:center;gap:8px}.flag-badge{width:30px;height:30px;border-radius:999px;border:1px solid var(--line);display:inline-flex;align-items:center;justify-content:center;background:color-mix(in srgb,var(--panel-2) 92%,transparent);font-size:1.15rem}
    .lang-menu{position:absolute;top:calc(100% + 8px);right:0;width:210px;background:var(--panel-2);border:1px solid var(--line);border-radius:16px;box-shadow:0 24px 60px rgba(0,0,0,.22);padding:6px;display:none;z-index:20}.lang-menu.open{display:grid;gap:4px}.lang-option{width:100%;border:1px solid transparent;border-radius:12px;background:transparent;color:var(--text);padding:10px 12px;display:flex;align-items:center;justify-content:space-between;gap:10px;cursor:pointer;text-align:left}.lang-option.active,.lang-option:hover{background:color-mix(in srgb,var(--accent) 13%, var(--panel-2));border-color:color-mix(in srgb,var(--accent) 35%, var(--line))}
    .lang-meta{display:flex;align-items:center;gap:10px}.lang-meta small{display:block;color:var(--muted)}
    .toolbar{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}.btn,.upload-label{border:none;border-radius:999px;padding:.84rem 1.08rem;min-height:44px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:8px;text-decoration:none}.primary,.upload-label{background:var(--accent);color:#fff}.secondary{background:var(--panel-2);color:var(--text);border:1px solid var(--line)}.danger{background:color-mix(in srgb,var(--danger) 14%, var(--panel-2));color:var(--text);border:1px solid color-mix(in srgb,var(--danger) 30%, var(--line))}.btn:disabled{opacity:.45;cursor:not-allowed} input[type=file]{display:none}
    .canvas-wrap{position:relative;overflow:hidden;border-radius:18px;border:1px solid var(--line);aspect-ratio:4/3;min-height:420px;background:linear-gradient(45deg, rgba(0,0,0,.04) 25%, transparent 25%, transparent 75%, rgba(0,0,0,.04) 75%), linear-gradient(45deg, rgba(0,0,0,.04) 25%, transparent 25%, transparent 75%, rgba(0,0,0,.04) 75%);background-position:0 0,12px 12px;background-size:24px 24px}
    #editorCanvas{display:block;width:100%;height:100%;touch-action:none}
    .hint{margin:10px 2px 0;color:var(--muted);font-size:.94rem}
    .status-grid,.preview-meta{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px;margin-top:12px}.card,.pill{border:1px solid var(--line);background:var(--panel-2);border-radius:16px;padding:12px 14px}.label{font-size:.72rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:4px}.value{font-weight:800;font-size:.95rem;word-break:break-word}
    .group{margin-bottom:18px}.group:last-child{margin-bottom:0}.group h2{margin:0;font-size:1.18rem}.group p{margin:4px 0 0;color:var(--muted);font-size:.94rem}.group-head{margin-bottom:10px}
    .preset-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}.preset{width:100%;text-align:left;padding:12px;border-radius:14px;border:1px solid var(--line);background:transparent;color:var(--text);cursor:pointer;min-height:70px}.preset.active{background:color-mix(in srgb,var(--accent) 14%,var(--panel-2));border-color:color-mix(in srgb,var(--accent) 40%,var(--line))}.preset strong{display:block;margin-bottom:4px;font-size:.95rem}.preset span{display:block;color:var(--muted);font-size:.82rem;line-height:1.35}
    .controls{display:grid;gap:12px}.control{display:grid;gap:5px}.control label{display:flex;justify-content:space-between;gap:10px;font-weight:700;font-size:.92rem}.control label span:last-child{color:var(--muted);font-variant-numeric:tabular-nums} input[type=range]{width:100%;accent-color:var(--accent)}
    .step-note{padding:10px 12px;border-radius:14px;background:color-mix(in srgb,var(--ok) 10%, var(--panel-2));border:1px solid color-mix(in srgb,var(--ok) 25%, var(--line));font-size:.92rem}
    .exports{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}.export-flow{display:grid;gap:12px}.export-step{display:none}.export-step.active{display:grid;gap:10px}.export-options{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}.export-option{padding:14px;border:1px solid var(--line);border-radius:16px;background:var(--panel-2);color:var(--text);text-align:left;cursor:pointer;transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease, background .18s ease}.export-option:hover{transform:translateY(-1px);box-shadow:var(--shadow)}.export-option.active{border-color:transparent;background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#fff;box-shadow:0 14px 32px rgba(0,0,0,.16)}.export-option strong{display:block;font-size:.98rem;margin-bottom:4px}.export-option span{display:block;font-size:.84rem;opacity:.9}.export-actions{display:flex;gap:8px;flex-wrap:wrap}.export-summary{font-size:.92rem;color:var(--muted)}.loading-overlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(10,12,12,.45);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);z-index:100;opacity:0;pointer-events:none;transition:opacity .18s ease}.loading-overlay.show{opacity:1;pointer-events:auto}.loading-card{min-width:min(92vw,340px);padding:20px;border-radius:20px;background:var(--panel-2);border:1px solid var(--line);box-shadow:var(--shadow);display:grid;justify-items:center;gap:12px;text-align:center}.spinner{width:42px;height:42px;border-radius:999px;border:4px solid color-mix(in srgb,var(--accent) 18%, transparent);border-top-color:var(--accent);animation:spin .9s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}.loading-text{font-weight:800}.quality-note{margin-top:10px;background:color-mix(in srgb,var(--danger) 14%, var(--panel-2));border:1px solid color-mix(in srgb,var(--danger) 45%, var(--line));color:#b42318;font-weight:800}.mobile-filter-zone{display:none}
    @media (max-width:1120px){.app{grid-template-columns:1fr}.right{position:static}}
    @media (max-width:920px){.app{width:min(100vw - 10px,100%);margin:5px auto}.left,.right{padding:10px}.topbar{flex-wrap:wrap;align-items:flex-start}.top-actions{width:100%;justify-content:flex-end}.preset-grid,.exports,.export-options{grid-template-columns:1fr}.canvas-wrap{min-height:290px}.right{display:none}.mobile-filter-zone{display:none;margin-top:14px}.app.mobile-step-filter .mobile-filter-zone{display:block}.mobile-preset-grid{display:grid;grid-auto-flow:column;grid-auto-columns:minmax(132px,1fr);gap:8px;overflow-x:auto;padding-bottom:4px;scrollbar-width:thin}.mobile-preset-grid .preset{min-width:132px;min-height:64px}.mobile-advanced{margin-top:10px}.mobile-advanced summary{cursor:pointer;list-style:none;font-weight:800;color:var(--text);padding:12px 14px;border:1px solid var(--line);background:var(--panel-2);border-radius:14px}.mobile-advanced[open] summary{border-bottom-left-radius:10px;border-bottom-right-radius:10px;margin-bottom:8px}.mobile-export-head{margin-top:14px}.mobile-steps{display:none;gap:8px;margin:12px 0 0}.mobile-step-pill{flex:1;border:1px solid var(--line);background:var(--panel-2);color:var(--text);border-radius:999px;padding:10px 12px;font-weight:800;font-size:.84rem}.mobile-step-pill.active{background:var(--accent);color:#fff;border-color:transparent}.group{margin-bottom:14px}}
  </style>
</head>
<body>
  <main class="app" id="appRoot">
    <section class="panel left">
      <div class="topbar">
        <div class="brand">
          <div class="logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3.5h9l3 3V18a2.5 2.5 0 0 1-2.5 2.5h-9A2.5 2.5 0 0 1 4 18V6A2.5 2.5 0 0 1 6.5 3.5Z"/><path d="M15 3.5V7h3"/><path d="M8 11.2h8"/><path d="M8 15h8"/></svg>
          </div>
          <div>
            <h1>PhotoScanner Web</h1>
            <p id="brandSubtitle"></p>
          </div>
        </div>
        <div class="top-actions">
          <div class="lang-box">
            <button class="lang-trigger" id="langTrigger" aria-haspopup="true" aria-expanded="false"><span class="flag-badge" id="langCurrentFlag">🇹🇷</span><span id="langCurrentCode">TR</span><span aria-hidden="true">▾</span></button>
            <div class="lang-menu" id="langMenu"></div>
          </div>
          <button class="theme-btn" id="themeBtn" aria-label="theme"></button>
        </div>
      </div>
      <div class="toolbar">
        <div class="mobile-steps" id="mobileSteps">
          <button type="button" class="mobile-step-pill" id="mobileStepUpload"></button>
          <button type="button" class="mobile-step-pill" id="mobileStepCrop"></button>
          <button type="button" class="mobile-step-pill" id="mobileStepFilter"></button>
        </div>
        <label class="upload-label" for="fileInput" id="uploadLabel"></label>
        <input id="fileInput" type="file" accept="image/*" />
        <button class="btn primary" id="cropBtn"></button>
        <button class="btn secondary" id="recropBtn"></button>
        <button class="btn danger" id="resetAllBtn"></button>
      </div>
      <div class="canvas-wrap" id="previewArea"><canvas id="editorCanvas"></canvas></div>
      <p class="hint" id="canvasHint"></p>
      <div class="step-note quality-note" id="previewQualityNote"></div>
      <div class="status-grid">
        <div class="card"><div class="label" id="sourceLabel"></div><div class="value" id="sourceInfo">—</div></div>
        <div class="card"><div class="label" id="stageLabel"></div><div class="value" id="stageInfo">—</div></div>
        <div class="card"><div class="label" id="outputLabel"></div><div class="value" id="outputInfo">—</div></div>
      </div>
      <section class="mobile-filter-zone" id="mobileFilterZone">
        <div class="group-head"><h2 id="mobilePresetTitle"></h2><p id="mobilePresetDesc"></p></div>
        <div class="card mobile-preset-grid" id="mobilePresetGrid"></div>
        <button class="btn secondary" id="mobileResetFiltersBtn" style="margin-top:10px;width:100%"></button>
        <details class="mobile-advanced" id="mobileAdvanced">
          <summary id="mobileAdvancedSummary"></summary>
          <div class="card controls" id="mobileControls"></div>
        </details>
        <div class="group-head mobile-export-head"><h2 id="mobileExportTitle"></h2><p id="mobileExportDesc"></p></div>
        <div class="card export-flow" id="mobileExportFlow">
          <div class="export-step active" id="mobileExportStepType">
            <div class="export-options" id="mobileExportTypeOptions"></div>
            <div class="step-note" id="mobileExportTypeHelp"></div>
          </div>
          <div class="export-step" id="mobileExportStepQuality">
            <div class="export-options" id="mobileExportQualityOptions"></div>
            <div class="export-summary" id="mobileExportSummary"></div>
            <button class="btn primary" id="mobileExportConfirmBtn"></button>
          </div>
          <div class="step-note" id="mobileExportNote"></div>
        </div>
      </section>
    </section>

    <aside class="panel right">
      <section class="group group-flow">
        <div class="group-head"><h2 id="flowTitle"></h2><p id="flowDesc"></p></div>
        <div class="step-note" id="flowNote"></div>
      </section>

      <section class="group group-presets">
        <div class="group-head"><h2 id="presetTitle"></h2><p id="presetDesc"></p></div>
        <div class="card preset-grid" id="presetGrid"></div>
        <button class="btn secondary" id="resetFiltersBtn" style="margin-top:10px;width:100%"></button>
      </section>

      <section class="group group-controls">
        <div class="group-head"><h2 id="controlsTitle"></h2><p id="controlsDesc"></p></div>
        <div class="card controls" id="controls"></div>
      </section>

      <section class="group group-export">
        <div class="group-head"><h2 id="exportTitle"></h2><p id="exportDesc"></p></div>
        <div class="card export-flow" id="exportFlow">
          <div class="export-step active" id="exportStepType">
            <div class="export-options" id="exportTypeOptions"></div>
            <div class="step-note" id="exportTypeHelp"></div>
          </div>
          <div class="export-step" id="exportStepQuality">
            <div class="export-options" id="exportQualityOptions"></div>
            <div class="export-summary" id="exportSummary"></div>
            <button class="btn primary" id="exportConfirmBtn"></button>
          </div>
          <div class="step-note" id="exportNote"></div>
        </div>
      </section>
    </aside>
  </main>

  <div class="loading-overlay" id="loadingOverlay" aria-hidden="true">
    <div class="loading-card">
      <div class="spinner" aria-hidden="true"></div>
      <div class="loading-text" id="loadingText"></div>
    </div>
  </div>

const i18n = {

function getPointerPos(e){ const r = canvas.getBoundingClientRect(); return {x:e.clientX-r.left,y:e.clientY-r.top}; }

function pointerCenter(a,b){ return {x:(a.x+b.x)/2, y:(a.y+b.y)/2}; }
function refreshPinchStart(){
  if(state.activePointers.size < 2){ state.pinchStart = null; return; }
  const pts = [...state.activePointers.values()].slice(0,2);
  state.pinchStart = {
    distance: Math.max(1, pointerDistance(pts[0], pts[1])),
    scale: state.view.scale,
    center: pointerCenter(pts[0], pts[1])
  };
}
function imageToCanvas(p){ return {x:state.view.offsetX + p.x*state.view.scale, y:state.view.offsetY + p.y*state.view.scale}; }
function canvasToImage(p){ return {x:clamp((p.x-state.view.offsetX)/state.view.scale,0,state.image.naturalWidth), y:clamp((p.y-state.view.offsetY)/state.view.scale,0,state.image.naturalHeight)}; }
function getActiveStageSize(){
  if(state.stage==='filter' && state.croppedBase) return { width: state.croppedBase.width, height: state.croppedBase.height };
  if(state.image) return { width: state.image.naturalWidth, height: state.image.naturalHeight };
  return null;
}
function clampViewOffsets(){
  const active = getActiveStageSize();
  if(!active) return;
  const rect = canvas.getBoundingClientRect();
  const padX = Math.max(120, rect.width * 0.32);
  const padY = Math.max(120, rect.height * 0.32);
  const minX = rect.width - active.width * state.view.scale - padX;
  const minY = rect.height - active.height * state.view.scale - padY;
  const maxX = padX;
  const maxY = padY;
  state.view.offsetX = Math.min(maxX, Math.max(minX, state.view.offsetX));
  state.view.offsetY = Math.min(maxY, Math.max(minY, state.view.offsetY));
}
function setZoom(nextScale, pivot){
  const active = getActiveStageSize();
  if(!active) return;
  const prev = state.view.scale;
  const minScale = state.view.baseScale * 0.38;
  const maxScale = state.view.baseScale * 6;
  const scale = clamp(nextScale, minScale, maxScale);
  const imgX = (pivot.x - state.view.offsetX) / prev;
  const imgY = (pivot.y - state.view.offsetY) / prev;
  state.view.scale = scale;
  state.view.width = active.width * scale;
  state.view.height = active.height * scale;
  state.view.offsetX = pivot.x - imgX * scale;
  state.view.offsetY = pivot.y - imgY * scale;
  clampViewOffsets();
  draw();
}
function outputSizeFromPoints(){ const [tl,tr,br,bl]=state.points; return { width: clamp(Math.round(Math.max(distance(tl,tr),distance(bl,br))),32,8000), height: clamp(Math.round(Math.max(distance(tl,bl),distance(tr,br))),32,8000) }; }
function clonePoints(points){ return points.map(p=>({x:p.x,y:p.y})); }
function orderPointsClockwise(points){
  if(!points || points.length!==4) return points;
  const pts = points.map(p=>({x:p.x,y:p.y}));
  const sums = pts.map(p=>p.x+p.y);
  const diffs = pts.map(p=>p.x-p.y);
  const tl = pts[sums.indexOf(Math.min(...sums))];
  const br = pts[sums.indexOf(Math.max(...sums))];
  const tr = pts[diffs.indexOf(Math.max(...diffs))];
  const bl = pts[diffs.indexOf(Math.min(...diffs))];
  return [tl,tr,br,bl];
}
function detectDocumentCorners(){
  if(!state.imageBitmap || !state.image) return null;
  const maxSide = 320;
  const scale = Math.min(1, maxSide / Math.max(state.image.naturalWidth, state.image.naturalHeight));
  const w = Math.max(40, Math.round(state.image.naturalWidth * scale));
  const h = Math.max(40, Math.round(state.image.naturalHeight * scale));
  const c = document.createElement('canvas'); c.width = w; c.height = h;
  const x = c.getContext('2d', { willReadFrequently:true });
  x.drawImage(state.imageBitmap, 0, 0, w, h);
  const img = x.getImageData(0,0,w,h);
  const data = img.data;
  const gray = new Float32Array(w*h);
  for(let i=0,j=0;i<data.length;i+=4,j++){ gray[j] = data[i]*0.299 + data[i+1]*0.587 + data[i+2]*0.114; }
  const edges = new Float32Array(w*h);
  let sum = 0, count = 0;
  for(let y=1;y<h-1;y++) for(let x0=1;x0<w-1;x0++){
    const idx = y*w + x0;
    const gx = -gray[idx-w-1] - 2*gray[idx-1] - gray[idx+w-1] + gray[idx-w+1] + 2*gray[idx+1] + gray[idx+w+1];
    const gy = -gray[idx-w-1] - 2*gray[idx-w] - gray[idx-w+1] + gray[idx+w-1] + 2*gray[idx+w] + gray[idx+w+1];
    const mag = Math.hypot(gx,gy);
    edges[idx] = mag; sum += mag; count++;
  }
  const threshold = (sum / Math.max(1,count)) * 1.45;
  let minSum = Infinity, maxSum = -Infinity, minDiff = Infinity, maxDiff = -Infinity;
  let tl=null, tr=null, br=null, bl=null;
  for(let y=2;y<h-2;y++) for(let x0=2;x0<w-2;x0++){
    const idx = y*w + x0; const mag = edges[idx];
    if(mag < threshold) continue;
    const s = x0 + y; const d = x0 - y;
    if(s < minSum){ minSum = s; tl = {x:x0,y}; }
    if(s > maxSum){ maxSum = s; br = {x:x0,y}; }
    if(d < minDiff){ minDiff = d; bl = {x:x0,y}; }
    if(d > maxDiff){ maxDiff = d; tr = {x:x0,y}; }
  }
  const pts = [tl,tr,br,bl];
  if(pts.some(p => !p)) return null;
  const unique = new Set(pts.map(p => `${p.x},${p.y}`));
  if(unique.size < 4) return null;
  const ordered = orderPointsClockwise(pts).map(p => ({ x: p.x / scale, y: p.y / scale }));
  const widthTop = distance(ordered[0], ordered[1]);
  const widthBottom = distance(ordered[3], ordered[2]);
  const heightLeft = distance(ordered[0], ordered[3]);
  const heightRight = distance(ordered[1], ordered[2]);
  const areaEstimate = Math.max(widthTop, widthBottom) * Math.max(heightLeft, heightRight);
  const imageArea = state.image.naturalWidth * state.image.naturalHeight;
  if(areaEstimate < imageArea * 0.08) return null;
  return ordered.map(p => ({ x: clamp(p.x, 0, state.image.naturalWidth), y: clamp(p.y, 0, state.image.naturalHeight) }));
}

  state.activePointers.set(e.pointerId, pos);
  canvas.setPointerCapture(e.pointerId);
  if(state.activePointers.size >= 2){
    state.dragging = -1;
    state.isPanning = false;
    state.panStart = null;
    refreshPinchStart();
    draw();
    return;
  }
  if(state.stage==='crop'){
    const hit=findHandle(pos);
    if(hit>=0){ state.dragging=hit; draw(); return; }
  }
  state.isPanning=true;
  state.panStart={x:pos.x,y:pos.y,offsetX:state.view.offsetX,offsetY:state.view.offsetY};
}
function onPointerMove(e){
  if(!getActiveStageSize()) return;
  const pos=getPointerPos(e);
  if(state.activePointers.has(e.pointerId)) state.activePointers.set(e.pointerId, pos);
  if(state.activePointers.size >= 2){
    const pts = [...state.activePointers.values()].slice(0,2);
    const center = pointerCenter(pts[0], pts[1]);
    const dist = Math.max(1, pointerDistance(pts[0], pts[1]));
    if(!state.pinchStart) refreshPinchStart();
    const nextScale = state.pinchStart.scale * (dist / state.pinchStart.distance);
    setZoom(nextScale, center);
    return;
  }
  if(state.stage==='crop' && state.dragging>=0){ state.points[state.dragging]=canvasToImage(pos); updateInfo(); draw(); return; }
  if(state.isPanning && state.panStart){
    state.view.offsetX = state.panStart.offsetX + (pos.x - state.panStart.x);
    state.view.offsetY = state.panStart.offsetY + (pos.y - state.panStart.y);
    clampViewOffsets();
    draw();
    return;
  }
  state.hover = state.stage==='crop' ? findHandle(pos) : -1;
  draw();
}
function onPointerUp(e){
  state.activePointers.delete(e.pointerId);
  if(canvas.hasPointerCapture(e.pointerId)) canvas.releasePointerCapture(e.pointerId);
  if(state.activePointers.size >= 2){ refreshPinchStart(); draw(); return; }
  state.pinchStart = null;
  if(state.dragging>=0){ state.dragging=-1; draw(); return; }
  if(state.isPanning){ state.isPanning=false; state.panStart=null; draw(); return; }
  draw();
}

function updateInfo(){
  el('sourceInfo').textContent = state.image ? `${state.image.naturalWidth} × ${state.image.naturalHeight}` : '—';
  if(state.stage==='crop' && state.points.length===4){ const s=outputSizeFromPoints(); el('outputInfo').textContent=`${s.width} × ${s.height}`; }
  else if(state.stage==='filter' && state.croppedBase){ el('outputInfo').textContent=`${state.croppedBase.width} × ${state.croppedBase.height}`; }
  else el('outputInfo').textContent='—';
}

function solveLinearSystem(A,b){ const n=b.length, M=A.map((row,i)=>[...row,b[i]]); for(let col=0;col<n;col++){ let pivot=col; for(let row=col+1;row<n;row++) if(Math.abs(M[row][col])>Math.abs(M[pivot][col])) pivot=row; [M[col],M[pivot]]=[M[pivot],M[col]]; const factor=M[col][col]||1e-12; for(let j=col;j<=n;j++) M[col][j]/=factor; for(let row=0;row<n;row++){ if(row===col) continue; const scale=M[row][col]; for(let j=col;j<=n;j++) M[row][j]-=scale*M[col][j]; }} return M.map(r=>r[n]); }
function solveHomography(src,dst){ const A=[], b=[]; for(let i=0;i<4;i++){ const {x,y}=src[i], u=dst[i].x, v=dst[i].y; A.push([x,y,1,0,0,0,-u*x,-u*y]); b.push(u); A.push([0,0,0,x,y,1,-v*x,-v*y]); b.push(v); } const h=solveLinearSystem(A,b); return [h[0],h[1],h[2],h[3],h[4],h[5],h[6],h[7],1]; }
function invert3x3(m){ const [a,b,c,d,e,f,g,h,i]=m; const A=e*i-f*h,B=-(d*i-f*g),C=d*h-e*g,D=-(b*i-c*h),E=a*i-c*g,F=-(a*h-b*g),G=b*f-c*e,H=-(a*f-c*d),I=a*e-b*d; const det=a*A+b*B+c*C; if(Math.abs(det)<1e-12) return null; const q=1/det; return [A*q,D*q,G*q,B*q,E*q,H*q,C*q,F*q,I*q]; }
function mapPoint(m,x,y){ const d=m[6]*x+m[7]*y+m[8]; return {x:(m[0]*x+m[1]*y+m[2])/d, y:(m[3]*x+m[4]*y+m[5])/d}; }
function getPixel(data,width,x,y){ const i=(y*width+x)*4; return [data[i],data[i+1],data[i+2],data[i+3]]; }
function bilinearSample(data,width,height,x,y){ const cx=clamp(x,0,width-1), cy=clamp(y,0,height-1), x0=Math.floor(cx), y0=Math.floor(cy), x1=Math.min(width-1,x0+1), y1=Math.min(height-1,y0+1), dx=cx-x0, dy=cy-y0; const p00=getPixel(data,width,x0,y0), p10=getPixel(data,width,x1,y0), p01=getPixel(data,width,x0,y1), p11=getPixel(data,width,x1,y1); const top=p00.map((v,i)=>v*(1-dx)+p10[i]*dx), bottom=p01.map((v,i)=>v*(1-dx)+p11[i]*dx); return top.map((v,i)=>Math.round(v*(1-dy)+bottom[i]*dy)); }

async function cropNow(){
  if(!state.image || state.points.length!==4 || state.busy) return;
  await runWithLoading(tr('loadingCrop'), async () => {
    const out = outputSizeFromPoints();
    state.cropMeta = { points: clonePoints(state.points), width: out.width, height: out.height };
    invalidateFullCropCache();
    invalidateFilterCache();
    const previewSize = getPreviewCropSize(out, 2000);
    const previewCanvas = createCroppedCanvas({ width: previewSize.width, height: previewSize.height });
    if(!previewCanvas) return;
    state.croppedBase = previewCanvas;
    state.stage='filter';
    state.view={baseScale:1,scale:1,offsetX:0,offsetY:0,width:1,height:1};
    resizeCanvas();
    updateTexts();
    draw();
  });
}

function applyFiltersToData(data,width,height,settings){
  const gamma=Math.max(.01,settings.gamma||1), gammaPow=1/gamma, brightness=settings.brightness||0, contrast=(259*((settings.contrast||0)+255))/(255*(259-(settings.contrast||0))), saturation=settings.saturation??1, mode=settings.mode||'color', threshold=settings.threshold??165;
  for(let i=0;i<data.length;i+=4){ let r=data[i], g=data[i+1], b=data[i+2]; r=255*Math.pow(r/255,gammaPow); g=255*Math.pow(g/255,gammaPow); b=255*Math.pow(b/255,gammaPow); r=contrast*(r-128)+128+brightness; g=contrast*(g-128)+128+brightness; b=contrast*(b-128)+128+brightness; const gray=.2126*r+.7152*g+.0722*b; r=gray+(r-gray)*saturation; g=gray+(g-gray)*saturation; b=gray+(b-gray)*saturation; if(mode==='gray'||mode==='bw'){ const mix=mode==='bw'?1:.92; const lum=.2126*r+.7152*g+.0722*b; r=g=b=lum*mix+255*(1-mix)*.02; } if(mode==='threshold'){ const lum=.2126*r+.7152*g+.0722*b; const v=lum>threshold?255:0; r=g=b=v; } if(mode==='doc'){ const boost=gray>180?1.08:1; r=r*boost+4; g=g*boost+4; b=b*boost+4; } data[i]=clamp(Math.round(r),0,255); data[i+1]=clamp(Math.round(g),0,255); data[i+2]=clamp(Math.round(b),0,255); }
  const amount=settings.sharpen||0; if(amount>.001) applySharpen(data,width,height,amount);
}
function applySharpen(data,width,height,amount){ const original=new Uint8ClampedArray(data); const k=[0,-1,0,-1,5,-1,0,-1,0]; for(let y=1;y<height-1;y++) for(let x=1;x<width-1;x++){ let r=0,g=0,b=0,n=0; for(let ky=-1;ky<=1;ky++) for(let kx=-1;kx<=1;kx++){ const idx=((y+ky)*width+(x+kx))*4, w=k[n++]; r+=original[idx]*w; g+=original[idx+1]*w; b+=original[idx+2]*w; } const i=(y*width+x)*4; data[i]=clamp(Math.round(original[i]*(1-amount)+r*amount),0,255); data[i+1]=clamp(Math.round(original[i+1]*(1-amount)+g*amount),0,255); data[i+2]=clamp(Math.round(original[i+2]*(1-amount)+b*amount),0,255); } }
function renderFilteredCanvas(options={}){
  if(options.mode==='export') return buildExportCanvas();
  return getFilteredPreviewCanvas();
}
function recrop(){ if(!state.image) return; state.stage='crop'; state.croppedBase=null; state.cropMeta=null; resetExportFlow(); invalidateFilterCache(); invalidateFullCropCache(); state.view={baseScale:1,scale:1,offsetX:0,offsetY:0,width:1,height:1}; resizeCanvas(); updateTexts(); draw(); }
function resetAll(){
  if(state.imageUrl) URL.revokeObjectURL(state.imageUrl);
  state.image=null; state.imageUrl=''; state.imageBitmap=null; state.points=[]; state.hover=-1; state.dragging=-1;
  state.stage='empty'; state.croppedBase=null; state.cropMeta=null; state.filteredPreview=null; state.filteredPreviewKey=''; state.fullCropCache=null; state.fullCropCacheKey='';
  state.settings={...presetDefs.original}; state.activePreset='original'; resetExportFlow(); state.view={baseScale:1,scale:1,offsetX:0,offsetY:0,width:1,height:1}; state.isPanning=false; state.panStart=null; state.activePointers=new Map(); state.pinchStart=null;
  state.sourceFileName='scan';
  el('fileInput').value='';
  buildPresets(); buildControls(); updateTexts(); resizeCanvas(); draw();
}

async function exportImage(type, qualityKey='high'){
  if(!state.croppedBase || state.busy) return;
  await runWithLoading(tr('loadingDownload'), async () => {
    const out = renderFilteredCanvas({mode:'export'});
    const settings = getQualitySettings(type, qualityKey);
    const exportCanvas = document.createElement('canvas');
    exportCanvas.width = Math.max(32, Math.round(out.width * settings.scale));
    exportCanvas.height = Math.max(32, Math.round(out.height * settings.scale));
    const ex = exportCanvas.getContext('2d',{willReadFrequently:true});
    ex.imageSmoothingEnabled = true;
    ex.imageSmoothingQuality = qualityKey==='high' ? 'high' : 'medium';
    ex.drawImage(out,0,0,exportCanvas.width,exportCanvas.height);
    const ext = type==='png' ? 'png' : 'jpg';
    const mime = type==='png' ? 'image/png' : 'image/jpeg';
    const encoderQuality = type==='png' ? 1 : settings.quality;
    const fileName = `${state.sourceFileName}-${qualityKey}-${Date.now()}.${ext}`;
    try{
      const dataUrl = exportCanvas.toDataURL(mime, encoderQuality);
      downloadDataUrl(dataUrl, fileName);
    }catch(err){
      exportCanvas.toBlob(blob=>downloadBlob(blob, fileName), mime, encoderQuality);
    }
  });
}
async function exportPdf(qualityKey='high'){
  if(!state.croppedBase || state.busy) return;
  await runWithLoading(tr('loadingDownload'), async () => {
    const out = renderFilteredCanvas({mode:'export'});
    const settings = getQualitySettings('pdf', qualityKey);
    const exportCanvas = document.createElement('canvas');
    exportCanvas.width = Math.max(32, Math.round(out.width * settings.scale));
    exportCanvas.height = Math.max(32, Math.round(out.height * settings.scale));
    const ex = exportCanvas.getContext('2d',{willReadFrequently:true});
    ex.imageSmoothingEnabled = true;
    ex.imageSmoothingQuality = qualityKey==='high' ? 'high' : 'medium';
    ex.drawImage(out,0,0,exportCanvas.width,exportCanvas.height);
    const imgData = exportCanvas.toDataURL('image/jpeg', settings.imageQuality);
    const { jsPDF } = window.jspdf;
    const orientation = exportCanvas.width>=exportCanvas.height ? 'landscape' : 'portrait';
    const pdf = new jsPDF({orientation, unit:'pt', format:[exportCanvas.width, exportCanvas.height], compress:true});
    pdf.addImage(imgData, 'JPEG', 0, 0, exportCanvas.width, exportCanvas.height, undefined, 'MEDIUM');
    pdf.save(`${state.sourceFileName}-${qualityKey}-${Date.now()}.pdf`);
  });
}
async function exportSelected(){
  if(!state.exportChoice.type || !state.exportChoice.quality) return;
  if(state.exportChoice.type==='pdf') return exportPdf(state.exportChoice.quality);
  return exportImage(state.exportChoice.type, state.exportChoice.quality);
}
function downloadDataUrl(dataUrl, name){
  const a = document.createElement('a');
  a.href = dataUrl;
  a.download = name;
  a.rel = 'noopener';
  document.body.appendChild(a);
  a.click();
  a.remove();
}
function downloadBlob(blob,name){
  if(!blob) return;
  const u = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = u;
  a.download = name;
  a.rel = 'noopener';
  document.body.appendChild(a);
  a.click();
  setTimeout(()=>{ a.remove(); URL.revokeObjectURL(u); }, 1500);
}

function bind(){
  el('fileInput').addEventListener('click', e => { e.target.value = ''; });
  el('fileInput').addEventListener('change',e=>loadFile(e.target.files?.[0]));
  const resetFilters = ()=>{ if(!(state.stage==='filter' && state.croppedBase)) return; state.activePreset='original'; state.settings={...presetDefs.original}; invalidateFilterCache(); buildPresets(); buildControls(); updateTexts(); if(state.stage==='filter') draw(); };
  el('cropBtn').addEventListener('click', () => cropNow()); el('recropBtn').addEventListener('click',recrop); el('resetAllBtn').addEventListener('click',resetAll); el('resetFiltersBtn').addEventListener('click',resetFilters); if(el('mobileResetFiltersBtn')) el('mobileResetFiltersBtn').addEventListener('click',resetFilters);
  el('exportConfirmBtn').addEventListener('click',()=>exportSelected()); el('mobileExportConfirmBtn').addEventListener('click',()=>exportSelected());
  canvas.addEventListener('pointerdown',onPointerDown); canvas.addEventListener('pointermove',onPointerMove); window.addEventListener('pointerup',onPointerUp); window.addEventListener('pointercancel',onPointerUp); canvas.addEventListener('pointerleave',()=>{ if(state.dragging<0 && !state.isPanning){ state.hover=-1; draw(); } });
  canvas.addEventListener('wheel', (e)=>{ if(!getActiveStageSize()) return; e.preventDefault(); const pos=getPointerPos(e); const factor = e.deltaY < 0 ? 1.12 : 0.89; setZoom(state.view.scale * factor, pos); }, { passive:false });
  window.addEventListener('resize',()=>{ resizeCanvas(); updateMobileStepUI(); draw(); });
  el('themeBtn').addEventListener('click',()=>{ state.theme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'; document.documentElement.setAttribute('data-theme',state.theme); updateTexts(); draw(); });
  el('langTrigger').addEventListener('click',()=> el('langMenu').classList.contains('open') ? closeLang() : openLang()); document.addEventListener('click',e=>{ if(!e.target.closest('.lang-box')) closeLang(); });
}

function init(){ document.documentElement.setAttribute('data-theme','light'); state.theme='light'; try{ const saved=localStorage.getItem('photoscanner_lang'); if(saved && i18n[saved]) state.lang=saved; }catch(e){} buildLangMenu(); updateTexts(); bind(); resizeCanvas(); draw(); }
init();
</script>
